name: Deploy to GitHub Pages

# Builds the web app and publishes apps/web/dist to the gh-pages branch.
# Uses only shell `run` steps (no external `uses:` actions), matching the org
# policy that blocks non-woobebox actions (see docs/github-actions-web-ci.md).

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and publish to gh-pages
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout repository without external actions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build (production, base=/treasure-box-inventory/)
        run: npm run build

      - name: Prepare Pages artifacts (SPA fallback + no Jekyll)
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          touch apps/web/dist/.nojekyll

      - name: Publish to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd apps/web/dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
